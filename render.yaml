services:
  - type: web
    name: routeme-v2
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build/
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html