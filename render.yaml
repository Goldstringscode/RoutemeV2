services:
  - type: static
    name: routeme-v2
    runtime: static
    repo: https://github.com/Goldstringscode/RoutemeV2
    branch: master
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build/
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html